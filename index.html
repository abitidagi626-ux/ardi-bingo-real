<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="location.reload()" style="background:#555; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Refresh</button>
                <div class="balance-box">💰 ETB <span id="balance">500.00</span></div>
            </div>
            <h2 style="text-align:center; color:#efae10; margin:15px 0; letter-spacing:2px;">ARDI BINGO</h2>
        </header>

        <div id="stake-screen">
            <div id="stake-list"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="active-info-box">
                <div style="font-size: 9px; color: #00c8ff; font-weight:bold;">ACTIVE</div>
                <div id="active-val" style="font-weight: bold; font-size: 14px;">0.00</div>
            </div>
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="arena-layout">
                    <div id="numbers-board" class="board-side"></div>
                    <div id="cards-stack" class="cards-side"></div>
                </div>
                <div class="bingo-area">
                    <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
                </div>
            </div>
        </div>

        <div id="buy-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="timer-display" style="color:#00ff00; margin-top:0;">00:60</h3>
                <div id="card-preview" style="background:white; padding:8px; border-radius:8px; margin-bottom:15px;"></div>
                <p id="card-count" style="font-weight:bold; color:white;">Cards Purchased: 0/4</p>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:5px; border:none; background:#555; color:white; cursor:pointer;">Cancel</button>
                    <button id="confirm-buy" onclick="addCard()" style="flex:1; background:#efae10; border:none; font-weight:bold; border-radius:5px; padding:10px; cursor:pointer;">Buy Card</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
