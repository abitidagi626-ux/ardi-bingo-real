<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="top-bar">
                <button onclick="location.reload()" class="action-btn">Refresh</button>
                <div class="balance-box">💰 ETB <span id="balance">500.00</span></div>
            </div>
            <div class="sub-header">
                <button class="deposit-btn">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen">
            <div id="active-alert" class="red-alert" style="display:none;">ACTIVE AMOUNT: 0.00 ETB</div>
            <div class="stake-table">
                <div class="stake-header">
                    <span>Stake</span><span>Timer</span><span>Possible Win</span><span>Join</span>
                </div>
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="card-screen" class="hidden">
            <div class="screen-nav">
                <button onclick="showStakeScreen()">⬅️ Back</button>
                <span id="card-price-info">30 Birr Per Card</span>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="game-layout">
                    <div id="numbers-board" class="numbers-board"></div>
                    <div id="arena-card" class="player-card-arena"></div>
                </div>
                <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <div id="modal-timer" class="modal-timer">00:60</div>
                <div id="preview-grid" class="preview-grid"></div>
                <div class="modal-btns">
                    <button onclick="closeModal()" class="back-btn">Back</button>
                    <button onclick="confirmPurchase()" class="confirm-btn">Confirm</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
