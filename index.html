<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Ardi Bingo</title> 
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS ዲዛይን */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #00221c; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top); 
            color: white;
        }

        #app { width: 100%; min-height: 100vh; }

        .main-header {
            background: #00332c; 
            padding: 10px 15px; 
            border-radius: 0 0 15px 15px; 
            border-bottom: 3px solid #efae10;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }

        .balance-status-box { 
            background: #efae10; 
            color: black; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: 900; 
            font-size: 14px; 
        }

        .logo { font-weight: bold; font-size: 1.2rem; color: #efae10; }

        /* Stake Table Design */
        .stake-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #00443a;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
        }

        .join-btn {
            background: #efae10;
            color: black;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Card Grid Design */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 15px;
        }

        .card-item {
            background: #efae10;
            color: black;
            padding: 15px 5px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bingo Card Inside Modal */
        .bingo-card-table {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: white;
            padding: 5px;
            color: black;
        }

        .bingo-cell {
            border: 1px solid #ccc;
            padding: 5px;
            font-size: 12px;
        }

        .hidden { display: none !important; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #00332c; width: 90%; max-width: 320px; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #efae10; }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="top-bar">
                <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:5px;">🔄 Refresh</button>
                <div class="balance-status-box">💰 ETB <span id="balance">0.00</span></div>
            </div>
            <div class="bottom-bar" style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="window.location.href='payment.html'" style="background:#efae10; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen">
            <div style="padding: 15px;">
                <h3 style="color: #efae10; margin-bottom: 15px; text-align: center;">Choose Your Stake</h3>
                <div id="stake-list">
                    </div>
            </div>
        </div>

        <div id="card-screen" class="hidden">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:15px;">
                <button onclick="showStakeScreen()" style="background:#444; border:none; color:white; padding: 5px 10px; border-radius: 5px;">⬅ Back</button>
                <div style="font-size:14px;"><span id="selected-stake-val">0</span> Birr | Card Selection</div>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <h4 id="modal-card-no" style="color:#efae10; margin-bottom:10px;">Card No. --</h4>
                <div id="preview-grid" class="bingo-card-table"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px; background:#555; color:white; border:none; border-radius:5px;">Back</button>
                    <button onclick="confirmPurchase()" style="flex:1; padding:10px; background:#efae10; color:black; border:none; border-radius:5px; font-weight:bold;">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentBalance = 0;
        let selectedStake = 0;
        let selectedCardId = null;

        // ከ URL ባላንስ መቀበል
        const params = new URLSearchParams(window.location.search);
        currentBalance = parseFloat(params.get('balance')) || 0;
        document.getElementById('balance').innerText = currentBalance.toFixed(2);

        // የStake ዝርዝር መፍጠር
        const stakes = [10, 20, 30, 50, 80, 100, 150, 200];
        const stakeList = document.getElementById('stake-list');
        stakes.forEach(s => {
            stakeList.innerHTML += `
                <div class="stake-row">
                    <span>${s} ETB</span>
                    <button class="join-btn" onclick="openCardSelection(${s})">Join »</button>
                </div>
            `;
        });

        function openCardSelection(amount) {
            selectedStake = amount;
            document.getElementById('selected-stake-val').innerText = amount;
            document.getElementById('stake-screen').classList.add('hidden');
            document.getElementById('card-screen').classList.remove('hidden');
            
            // 200 ካርዶችን መፍጠር
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            for(let i=1; i<=200; i++) {
                grid.innerHTML += `<div class="card-item" onclick="viewCard(${i})">${i}</div>`;
            }
        }

        function showStakeScreen() {
            document.getElementById('card-screen').classList.add('hidden');
            document.getElementById('stake-screen').classList.remove('hidden');
        }

        function viewCard(id) {
            selectedCardId = id;
            document.getElementById('modal-card-no').innerText = `Card No. ${id}`;
            
            // የካርድ ቁጥሮችን በዘፈቀደ መሙላት
            const preview = document.getElementById('preview-grid');
            preview.innerHTML = '';
            for(let i=0; i<25; i++) {
                preview.innerHTML += `<div class="bingo-cell">${Math.floor(Math.random()*99)+1}</div>`;
            }
            document.getElementById('card-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('card-modal').classList.add('hidden');
        }

        function confirmPurchase() {
            if (currentBalance < selectedStake) {
                alert("በቂ ባላንስ የለዎትም!");
                return;
            }
            
            // ባላንስ መቀነስ
            currentBalance -= selectedStake;
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
            
            // ለቦቱ መረጃ መላክ
            const data = {
                type: 'buy_card',
                amount: selectedStake,
                cardId: selectedCardId
            };
            tg.sendData(JSON.stringify(data));
            
            alert(`ካርድ ቁጥር ${selectedCardId} ተገዝቷል! መልካም እድል!`);
            closeModal();
        }
    </script>
</body>
</html>
