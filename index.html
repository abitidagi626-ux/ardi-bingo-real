<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .selected-card { background-color: #16a34a !important; border: 2px solid white; } /* Green for selected */
        .stake-active { border: 4px solid #facc15; transform: scale(1.1); }
    </style>
</head>
<body class="bg-purple-900 text-white font-sans min-h-screen overflow-x-hidden">

    <div id="stake-page" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-2xl font-bold mb-8">Stake (መደብ ይምረጡ)</h1>
        <div class="grid grid-cols-2 gap-6 mb-10">
            <button onclick="selectStake(10)" class="stake-btn bg-orange-500 w-24 h-24 rounded-full text-2xl font-bold shadow-2xl">10</button>
            <button onclick="selectStake(20)" class="stake-btn bg-orange-500 w-24 h-24 rounded-full text-2xl font-bold shadow-2xl">20</button>
            <button onclick="selectStake(50)" class="stake-btn bg-orange-500 w-24 h-24 rounded-full text-2xl font-bold shadow-2xl">50</button>
            <button onclick="selectStake(100)" class="stake-btn bg-orange-500 w-24 h-24 rounded-full text-2xl font-bold shadow-2xl">100</button>
        </div>
        <p class="text-purple-300">@ArdiiiBingoBot</p>
    </div>

    <div id="game-page" class="hidden p-2">
        <div class="flex justify-between items-center bg-blue-100 text-blue-900 p-2 rounded-lg text-[10px] font-bold mb-4 shadow-lg">
            <div class="text-center">Game<br><span id="game-id">27721</span></div>
            <div class="text-center">Bet<br><span id="display-bet">0 ETB</span></div>
            <div class="text-center">Timer<br><span id="timer" class="text-red-600 text-sm">60s</span></div>
            <div class="text-center">Wallet<br>0.00 ETB</div>
            <div class="text-center bg-blue-200 p-1 rounded">Derrash<br><b id="potential-win" class="text-xs text-red-600">0.00</b></div>
        </div>

        <p class="text-center mb-2 font-bold text-orange-400">ካርቴላ ይምረጡ</p>

        <div id="cards-container" class="grid grid-cols-5 gap-2 overflow-y-auto max-h-[70vh] p-1">
            </div>
        <p class="text-center mt-4 text-[10px] text-purple-300">@ArdiiiBingoBot</p>
    </div>

    <div id="card-view" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 z-50">
        <div class="bg-orange-200 rounded-2xl p-4 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-black font-bold mb-2">Card #<span id="selected-card-num">0</span></h2>
            <div class="grid grid-cols-5 bg-white rounded-lg overflow-hidden border-2 border-orange-400 text-black font-bold">
                <div class="bg-green-500 text-white p-1">B</div><div class="bg-red-500 text-white p-1">I</div>
                <div class="bg-orange-400 text-white p-1">N</div><div class="bg-blue-600 text-white p-1">G</div>
                <div class="bg-pink-500 text-white p-1">O</div>
                <div id="card-numbers" class="contents"></div>
            </div>
            <div class="flex gap-4 mt-6">
                <button onclick="acceptCard()" class="flex-1 bg-green-600 text-white py-3 rounded-full font-bold">Accept</button>
                <button onclick="closeCard()" class="flex-1 bg-orange-600 text-white py-3 rounded-full font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let selectedStake = 0;
        let selectedCardId = null;
        let timeLeft = 60;
        let isCardAccepted = false;

        // 1. Stake መምረጥ እና ወደ ጌም መግባት
        function selectStake(amount) {
            selectedStake = amount;
            document.getElementById('display-bet').innerText = amount + " ETB";
            document.getElementById('stake-page').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            initCards();
            startTimer();
        }

        // 2. ካርቴላዎችን መፍጠር
        function initCards() {
            const container = document.getElementById('cards-container');
            for(let i=1; i<=100; i++) {
                let btn = document.createElement('button');
                btn.id = `card-btn-${i}`;
                btn.className = "bg-orange-700 p-3 rounded text-sm font-bold shadow";
                btn.innerText = i;
                btn.onclick = () => showCard(i);
                container.appendChild(btn);
            }
        }

        // 3. ታይመር ማስጀመር
        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    alert("ጊዜው አልቋል! ወደ ዋናው ጨዋታ (Call Numbers) በመሄድ ላይ...");
                }
            }, 1000);
        }

        // 4. የካርቴላ ቁጥሮችን መፍጠር (ቁጥሮች እንዳይደገሙ)
        function showCard(num) {
            selectedCardId = num;
            document.getElementById('selected-card-num').innerText = num;
            const container = document.getElementById('card-numbers');
            container.innerHTML = '';

            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    if(row === 2 && col === 2) {
                        container.innerHTML += `<div class="p-2 border border-gray-200 bg-gray-100 text-xs">⭐</div>`;
                    } else {
                        // ቁጥሮች እንዳይደገሙ ሎጂክ
                        let min = ranges[col][0], max = ranges[col][1];
                        let val = Math.floor(Math.random() * (max - min + 1)) + min;
                        container.innerHTML += `<div class="p-2 border border-gray-200 bg-white text-xs">${val}</div>`;
                    }
                }
            }
            document.getElementById('card-view').classList.remove('hidden');
        }

        function acceptCard() {
            isCardAccepted = true;
            // Derrash ስሌት [Stake * 0.85]
            let derrash = (selectedStake * 0.85).toFixed(2);
            document.getElementById('potential-win').innerText = derrash;
            
            // የተመረጠው ካርቴላ አረንጓዴ እንዲሆን
            document.querySelectorAll('#cards-container button').forEach(b => b.classList.remove('selected-card'));
            document.getElementById(`card-btn-${selectedCardId}`).classList.add('selected-card');
            
            closeCard();
        }

        function closeCard() { document.getElementById('card-view').classList.add('hidden'); }
    </script>
</body>
</html>
