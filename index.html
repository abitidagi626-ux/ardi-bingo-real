<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo - Gold Version</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary-bg: #0d0d0d; 
            --card-bg: #1a1a1a; 
            --gold: #ffcc00; 
            --text: #ffffff; 
            --green: #28a745; 
            --red: #ff4d4d; 
            --gold-grad: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary-bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        .app { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; margin: auto; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; }
        .header { background: #000; padding: 12px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        
        /* Gold Welcome & 3D Elements */
        .welcome-title { font-size: 42px; font-weight: 900; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 5px 10px rgba(255, 204, 0, 0.2); }
        .balls-3d { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .ball-3d { width: 48px; height: 48px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, var(--gold)); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; box-shadow: 0 4px 15px rgba(255,204,0,0.4); }
        .play-btn-large { background: var(--gold-grad); color: #000; border: none; padding: 18px 60px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0px 5px 20px rgba(255, 204, 0, 0.3); transition: 0.3s; }
        .play-btn-large:active { transform: scale(0.95); }

        /* Navigation */
        .back-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        
        /* Grid and UI */
        .stake-btn { background: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .stake-btn:hover { border-color: var(--gold); }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #333; padding: 2px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #111; color: #fff; font-weight: bold; font-size: 11px; cursor: pointer; }
        .cell.marked { background: var(--gold) !important; color: #000; }
        
        .footer { position: absolute; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .footer-item { text-align: center; color: #666; font-size: 12px; cursor: pointer; }
        .footer-item.active { color: var(--gold); }

        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
    </style>
</head>
<body>

<div id="win-overlay">
    <h1 style="color:var(--gold); font-size:50px; margin:0;">BINGO!</h1>
    <p id="winner-info" style="color:white;"></p>
    <h2 id="win-amt-display" style="color:var(--gold);"></h2>
    <div class="card-grid" id="winner-card-display" style="width: 220px; margin: 20px;"></div>
    <button onclick="closeWinOverlay()" class="btn" style="background:var(--gold); width: 150px;">ተመለስ</button>
</div>

<div class="app">
    <div class="header">
        <div id="nav-area">
            <button id="main-back-btn" class="back-btn" style="display:none;" onclick="goBack()"><i class="fas fa-arrow-left"></i> BACK</button>
            <span id="logo-text" style="color:var(--gold); font-weight:900; font-size:20px;">ARDI</span>
        </div>
        <div style="background:#111; padding:6px 15px; border-radius:20px; border:1px solid var(--gold); color:var(--gold);">
            <i class="fas fa-coins"></i> <span id="u-bal">0.00</span>
        </div>
    </div>

    <div class="content">
        <div id="view-welcome" class="view" style="text-align:center; padding-top:40px;">
            <div class="welcome-title">ARDI BINGO</div>
            <div class="balls-3d">
                <div class="ball-3d">12</div><div class="ball-3d">35</div><div class="ball-3d">58</div><div class="ball-3d">74</div>
            </div>
            <button class="play-btn-large" onclick="openStakeView()">PLAY NOW</button>
            <div style="margin-top:40px; color:#444;">
                <div style="border:1px dashed #333; padding:20px; border-radius:15px;">
                    <i class="fas fa-gamepad fa-2x"></i><br>KENO & SPIN COMING SOON
                </div>
            </div>
        </div>

        <div id="view-stake" class="view" style="display:none;">
            <h3 style="text-align:center; color:var(--gold);">STAKE ይምረጡ</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                <div class="stake-btn" onclick="openCards(20)"><h2 style="color:var(--gold); margin:0;">20</h2><small>BIRR</small><br><span id="t-20">02:00</span></div>
                <div class="stake-btn" onclick="openCards(30)"><h2 style="color:var(--gold); margin:0;">30</h2><small>BIRR</small><br><span id="t-30">02:00</span></div>
                <div class="stake-btn" onclick="openCards(50)"><h2 style="color:var(--gold); margin:0;">50</h2><small>BIRR</small><br><span id="t-50">02:00</span></div>
                <div class="stake-btn" onclick="openCards(100)"><h2 style="color:var(--gold); margin:0;">100</h2><small>BIRR</small><br><span id="t-100">02:00</span></div>
            </div>
        </div>

        <div id="view-cards" class="view" style="display:none;">
            <div id="card-container" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;"></div>
        </div>

        <div id="view-play" class="view" style="display:none;">
            <div style="text-align:center; margin-bottom:20px;">
                <small style="color:var(--gold);">የወጣው ቁጥር</small>
                <div id="cur-num" style="font-size:60px; font-weight:900; color:#fff; text-shadow:0 0 20px var(--gold);">--</div>
            </div>
            <div id="play-area" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        </div>

        <div id="view-wallet" class="view" style="display:none;">
            <div style="background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid #333;">
                <h4 style="color:var(--gold); margin-top:0;">የሒሳብ መሙያ (Deposit)</h4>
                <p style="font-size:12px; color:#888;">በ 0979429028 (Yordanos) በቴሌብር ይላኩ</p>
                <input type="number" id="dep-amt" placeholder="መጠን (ETB)">
                <input type="text" id="dep-tx" placeholder="Transaction ID">
                <button onclick="deposit()" class="btn" style="background:var(--gold); color:#000;">አስገባ</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-item active" onclick="showView('view-welcome')"><i class="fas fa-home"></i><br>HOME</div>
        <div class="footer-item" onclick="showView('view-wallet')"><i class="fas fa-wallet"></i><br>WALLET</div>
    </div>
</div>

<div id="auth-screen" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="width:80%; text-align:center; background:var(--card-bg); padding:30px; border-radius:20px; border:1px solid var(--gold);">
        <h2 style="color:var(--gold);">ARDI LOGIN</h2>
        <input type="text" id="phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="pass" placeholder="ፓስወርድ">
        <button onclick="auth('login')" class="play-btn-large" style="width:100%; padding:12px; margin-top:20px;">ግባ</button>
    </div>
</div>

<script>
    // Config: እነዚህን መረጃዎች ሰርቨሩ ላይ መጠቀም ያስፈልጋል
    // Token: 8684712579:AAE9JK0cdSK-cVeycF7xAd_KSrUUqmN5HWI
    // WebApp URL: https://abitidagi626-ux.github.io/ardi-bingo-real/index.html

    const socket = io();
    let user = { phone: '', balance: 0, activeCards: [] };
    let curStake = 0, viewHistory = [];

    function showView(viewId, pushHistory = true) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(viewId).style.display = 'block';
        
        const backBtn = document.getElementById('main-back-btn');
        const logo = document.getElementById('logo-text');
        
        if (viewId === 'view-welcome' || viewId === 'view-play') {
            backBtn.style.display = 'none';
            logo.style.display = 'block';
            viewHistory = [];
        } else {
            backBtn.style.display = 'block';
            logo.style.display = 'none';
            if(pushHistory) viewHistory.push(viewId);
        }
    }

    function goBack() {
        if (viewHistory.length > 1) {
            viewHistory.pop();
            showView(viewHistory[viewHistory.length - 1], false);
        } else {
            showView('view-welcome');
        }
    }

    async function auth(type) {
        const p = document.getElementById('phone').value, ps = document.getElementById('pass').value;
        const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone:p, password:ps, type })});
        const data = await res.json();
        if(data.success) {
            user.phone = p; document.getElementById('u-bal').innerText = data.balance.toFixed(2);
            document.getElementById('auth-screen').style.display = 'none';
        } else alert(data.msg);
    }

    function openStakeView() { showView('view-stake'); }

    function openCards(s) {
        curStake = s; showView('view-cards');
        socket.emit('getSold', s, (sold) => {
            const container = document.getElementById('card-container'); container.innerHTML = '';
            for(let i=1; i<=40; i++) {
                const div = document.createElement('div');
                div.style = "padding:15px; border:1px solid #333; background:#111; text-align:center; border-radius:8px; cursor:pointer; color:var(--gold);";
                div.innerText = i;
                if(sold[i]) div.style.opacity = "0.3";
                else div.onclick = () => buyCard(i);
                container.appendChild(div);
            }
        });
    }

    async function buyCard(id) {
        const nums = genNums();
        const res = await fetch('/api/buy-card', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: user.phone, stake: curStake, cardId: id, nums })});
        const data = await res.json();
        if(data.success) {
            user.activeCards.push({ stake: curStake, nums, cardId: id });
            document.getElementById('u-bal').innerText = data.newBalance.toFixed(2);
            showView('view-welcome');
        } else alert(data.msg);
    }

    socket.on('gameUpdate', (gs) => {
        const g = gs[user.activeCards[0]?.stake || 20];
        if(g && user.activeCards.length > 0 && g.isCallStarted) {
            showView('view-play');
            document.getElementById('cur-num').innerText = g.calledNumbers[g.calledNumbers.length-1] || '--';
            renderPlayArea(g.calledNumbers);
        }
    });

    function renderPlayArea(called) {
        const area = document.getElementById('play-area'); area.innerHTML = '';
        user.activeCards.forEach((c, idx) => {
            const w = document.createElement('div');
            w.innerHTML = `<div style="font-size:10px; text-align:center; color:var(--gold);">#${c.cardId}</div><div class="card-grid" id="grid-${idx}"></div><button onclick="callBingo(${idx})" style="width:100%; background:var(--gold); border:none; margin-top:5px; font-weight:bold; height:25px; border-radius:5px;">BINGO</button>`;
            area.appendChild(w);
            const grid = w.querySelector('.card-grid');
            c.nums.forEach(n => {
                const cell = document.createElement('div');
                cell.className = 'cell' + (called.includes(n) || n === 'FREE' ? ' marked' : '');
                cell.innerText = n; grid.appendChild(cell);
            });
        });
    }

    function callBingo(idx) {
        socket.emit('callBingo', { phone: user.phone, stake: user.activeCards[idx].stake, nums: user.activeCards[idx].nums, cardId: user.activeCards[idx].cardId });
    }

    socket.on('gameOver', (d) => {
        document.getElementById('winner-info').innerText = `${d.winner} በካርድ #${d.cardId} አሸነፈ!`;
        document.getElementById('win-amt-display').innerText = `${d.winAmount.toFixed(2)} ETB`;
        document.getElementById('win-overlay').style.display = 'flex';
    });

    function closeWinOverlay() { location.reload(); }

    function genNums() {
        let n = []; while(n.length < 25) { let r = Math.floor(Math.random()*75)+1; if(!n.includes(r)) n.push(r); }
        n[12] = 'FREE'; return n;
    }
</script>
</body>
</html>
