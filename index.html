<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stake-3d { box-shadow: 0 8px 0 #c2410c, 0 15px 20px rgba(0,0,0,.3); transition: all 0.2s; }
        .stake-3d:active { transform: translateY(4px); box-shadow: 0 4px 0 #c2410c; }
        .selected-card { background-color: #16a34a !important; color: white; cursor: not-allowed; }
        .back-btn { position: absolute; top: 10px; left: 10px; cursor: pointer; background: #eee; padding: 5px 10px; rounded: 50%; font-weight: bold; }
    </style>
</head>
<body class="bg-white font-sans min-h-screen">

    <div id="home-page" class="flex flex-col items-center justify-center min-h-screen p-4">
        <img src="logo.png" alt="Logo" class="w-32 mb-8"> <h1 class="text-2xl font-black mb-10 text-purple-900">እንኳን በደህና መጡ</h1>
        <div class="grid grid-cols-1 gap-6 w-full max-w-xs">
            <button onclick="showPage('stake-page')" class="bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">🕹 PLAY NOW</button>
            <button onclick="showPage('deposit-methods')" class="bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">💰 DEPOSIT</button>
        </div>
    </div>

    <div id="deposit-methods" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <button onclick="showPage('home-page')" class="back-btn">←</button>
        <img src="logo.png" alt="Logo" class="w-20 mb-4">
        <h2 class="text-purple-700 font-bold mb-6 text-xl">Manual Deposit</h2>
        <p class="text-gray-600 mb-6 font-bold">Select your bank to deposit funds</p>
        <div class="grid grid-cols-3 gap-4 w-full">
            <div onclick="showDeposit('CBE')" class="border rounded-xl p-2 text-center cursor-pointer shadow">
                <img src="cbe.png" class="h-12 mx-auto mb-2"> <p class="text-[10px] font-bold">CBE Bank</p>
            </div>
            <div onclick="showDeposit('CBE_BIRR')" class="border rounded-xl p-2 text-center cursor-pointer shadow">
                <img src="cbebirr.png" class="h-12 mx-auto mb-2"> <p class="text-[10px] font-bold">CBE Birr</p>
            </div>
            <div onclick="showDeposit('TELEBIRR')" class="border rounded-xl p-2 text-center cursor-pointer shadow">
                <img src="telebirr.png" class="h-12 mx-auto mb-2"> <p class="text-[10px] font-bold">Telebirr</p>
            </div>
        </div>
        <p class="mt-20 text-gray-500 text-xs">Copyright © Allora-Groups 2025</p>
    </div>

    <div id="deposit-details" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm relative">
            <button onclick="hideModal('deposit-details')" class="absolute top-2 right-4 text-2xl">×</button>
            <h3 id="bank-title" class="font-bold text-center mb-4"></h3>
            <div class="bg-gray-100 p-4 rounded-xl text-center mb-4">
                <p id="account-number" class="text-blue-700 text-2xl font-black tracking-widest mb-2"></p>
                <p id="account-name" class="text-xs font-bold text-gray-600 uppercase"></p>
            </div>
            <ol class="text-[11px] text-left space-y-2 mb-4 list-decimal px-4">
                <li>ከላይ ያለውን አካውንት ኮፒ አድርገው ብር ያስገቡ</li>
                <li>የደረሰኝ ቁጥር ወይም የዲጂት ኮድ ከታች ያስገቡ</li>
            </ol>
            <textarea id="ref-input" class="w-full border p-2 rounded-lg text-sm h-24 mb-4" placeholder="Transaction Number እዚህ ጋር ያስገቡ..."></textarea>
            <button onclick="sendVerification()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold">Send for Verification</button>
        </div>
    </div>

    <div id="stake-page" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <button onclick="showPage('home-page')" class="back-btn">←</button>
        <h1 class="text-3xl font-black mb-12 text-purple-900">Stake (መደብ ይምረጡ)</h1>
        <div class="grid grid-cols-2 gap-8 mb-16">
            <button onclick="selectStake(10)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">10</button>
            <button onclick="selectStake(20)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">20</button>
            <button onclick="selectStake(50)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">50</button>
            <button onclick="selectStake(100)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">100</button>
        </div>
    </div>

    <div id="game-page" class="hidden p-2">
        <div class="flex justify-between items-center bg-blue-600 text-white p-3 rounded-xl text-[10px] font-bold mb-4">
            <div>Game<br><span>27721</span></div>
            <div>Bet<br><span id="display-bet">0 ETB</span></div>
            <div class="bg-white text-blue-900 px-2 py-1 rounded">Timer<br><span id="timer" class="text-red-600 text-sm">60s</span></div>
            <div>Wallet<br><span id="wallet-balance">0.00 ETB</span></div>
            <div class="bg-yellow-400 text-blue-900 p-1 rounded">Derrash<br><b id="potential-win">0.00</b></div>
        </div>
        <div id="cards-container" class="grid grid-cols-5 gap-3 p-2 bg-gray-100 rounded-2xl"></div>
    </div>

    <script>
        let wallet = 0;
        let selectedStake = 0;
        let isCardAccepted = false;

        function showPage(pageId) {
            document.querySelectorAll('div[id]').forEach(div => {
                if(!div.id.includes('details') && !div.id.includes('view')) div.classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
        }

        function showDeposit(method) {
            const modal = document.getElementById('deposit-details');
            const title = document.getElementById('bank-title');
            const acc = document.getElementById('account-number');
            const name = document.getElementById('account-name');

            if(method === 'TELEBIRR') {
                title.innerText = "Telebirr 100 BIRR Deposit";
                acc.innerText = "251979429028";
                name.innerText = "YORDANOSE TETKEM";
            } else if(method === 'CBE') {
                title.innerText = "Commercial Bank of Ethiopia Deposit";
                acc.innerText = "1000277987067";
                name.innerText = "YORDANOSE TETKEM";
            }
            modal.classList.remove('hidden');
        }

        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        function sendVerification() {
            alert("Verification sent to Admin. Please wait for approval.");
            hideModal('deposit-details');
        }

        // Admin Approval Simulation (ለሙከራ ያህል)
        function adminApprove(amount) {
            wallet += amount;
            document.getElementById('wallet-balance').innerText = wallet.toFixed(2) + " ETB";
        }

        function selectStake(amount) {
            selectedStake = amount;
            document.getElementById('display-bet').innerText = amount + " ETB";
            showPage('game-page');
            initCards();
        }

        function initCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                container.innerHTML += `<button onclick="alert('Card selected!')" class="bg-white text-purple-900 p-4 rounded-xl font-black shadow-md border-b-4 border-gray-300">${i}</button>`;
            }
        }
    </script>
</body>
</html>
