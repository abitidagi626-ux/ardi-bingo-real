<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="stake-screen">
            <div class="main-header">
                <div class="top-bar"><b class="logo">ARDI BINGO</b><div class="balance-box">ETB <span id="balance">0.00</span></div></div>
            </div>
            <div class="red-alert" id="active-alert">ACTIVE AMOUNT: 0.00 ETB</div>
            <div class="stake-table">
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="card-screen" class="hidden">
            <button onclick="showStakeScreen()" style="color:white; background:none; border:none; padding:10px;">← Back</button>
            <div style="text-align:center; margin-bottom:10px;"><span id="selected-stake-val">0</span> Birr Per Card</div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="game-layout">
                    <div id="numbers-board" class="numbers-board"></div>
                    <div id="arena-card" class="player-card-arena"></div>
                </div>
                <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <span id="modal-timer" style="color:#00ff00; font-size:24px; font-weight:bold;">00:60</span>
                <div id="modal-card-no" style="margin:10px 0;">Card No. --</div>
                <div id="preview-grid" class="preview-grid"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px;">Back</button>
                    <button onclick="confirmPurchase()" style="flex:1; padding:10px; background:#efae10; border:none; font-weight:bold;">Confirm</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
