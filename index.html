<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; }
        .winner-card-box { background: white; padding: 10px; border-radius: 10px; margin-top: 15px; box-shadow: 0 0 20px #efae10; }
        .winner-cell { background: #4caf50 !important; color: white !important; border: 1px solid #fff; }
        .hidden { display: none !important; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .balance-status-box { background: #efae10; color: black; padding: 5px 15px; border-radius: 15px; font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .refresh-btn { background: #444; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; }
        .deposit-btn { background: #efae10; border: none; padding: 6px 15px; border-radius: 5px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #efae10; letter-spacing: 1px; }

        .modal-content { 
            background: #00332c; 
            width: 90%; 
            max-width: 320px; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #efae10;
        }
        #preview-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 2px; 
            background: #fff; 
            padding: 5px; 
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header" style="background: #00332c; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-bottom: 3px solid #efae10;">
            <div class="top-bar">
                <button onclick="location.reload()" class="refresh-btn">Refresh</button>
                <div class="balance-status-box">💰 ETB <span id="balance">0.00</span></div>
            </div>
            <div class="bottom-bar">
                <button class="deposit-btn">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen">
            <div class="stake-table"><div id="stake-list"></div></div>
        </div>

        <div id="card-screen" class="hidden">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
                <button onclick="showStakeScreen()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">⬅</button>
                <div style="font-size:14px;"><span id="selected-stake-val">0</span> Birr | <span id="card-count-info">0</span>/4 Cards</div>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div style="color:#efae10; font-weight:bold; font-size:16px; text-align:center;">Win: <span id="arena-win-amount">0.00</span></div>
            <div class="game-arena-layout">
                <div class="game-status-side">
                    <div class="drawn-ball" id="current-ball">-</div>
                    <div id="numbers-board" class="numbers-board"></div>
                </div>
                <div class="cards-side">
                    <div id="arena-cards-container"></div>
                </div>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <div style="color:#00ff00; font-weight:bold; font-size:18px;" id="modal-timer">00:60</div>
                <h4 id="modal-card-no" style="color:#efae10; margin:10px 0; font-size:18px;">Card No. --</h4>
                <div id="preview-grid"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#555; color:white; font-weight:bold; cursor:pointer;">Back</button>
                    <button onclick="confirmPurchase()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#efae10; color:black; font-weight:bold; cursor:pointer;">Confirm</button>
                </div>
            </div>
        </div>

        <div id="winner-display-overlay" class="winner-overlay hidden">
            <h1 style="color:#efae10; font-size:50px; margin:0; text-shadow: 2px 2px #000;">BINGO!</h1>
            <h2 id="winner-text" style="color:white; margin:10px 0;">Card #-- is the Winner!</h2>
            <div id="winning-card-preview" class="winner-card-box"></div>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:#efae10; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Play Again</button>
        </div>

        <div id="bingo-overlay" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; font-weight:900; color:#efae10; z-index:2000; display:none; text-shadow:2px 2px 10px black;">BINGO!</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
