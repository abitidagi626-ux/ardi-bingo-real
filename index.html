<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Ardi Bingo</title> 
    <link rel="stylesheet" href="style.css">
    <style>
        /* ሁሉንም margin እና padding በማጥፋት ከላይ ያለውን ባዶ ቦታ እናጠፋለን */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #00221c; 
            font-family: sans-serif;
            overflow-x: hidden;
            /* ለ Notch ስልኮች የላይኛው ባር ክፍተት እንዳይኖር */
            padding-top: env(safe-area-inset-top); 
        }

        #app { width: 100%; min-height: 100vh; }

        /* Header ማስተካከያ - ከላይ ምንም ጋፕ እንዳይኖር */
        .main-header {
            background: #00332c; 
            padding: 10px 15px; 
            border-radius: 0 0 15px 15px; 
            border-bottom: 3px solid #efae10;
            margin-top: 0;
            position: relative;
            z-index: 1000;
        }

        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }

        .balance-status-box { 
            background: #efae10; 
            color: black; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: 900; 
            font-size: 13px; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            white-space: nowrap;
        }

        .refresh-btn { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; }
        
        /* Deposit Button - ወደ payment.html እንዲሄድ ተደርጓል */
        .deposit-btn { 
            background: #efae10; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 12px; 
            cursor: pointer; 
        }

        .logo { font-weight: bold; font-size: 1.1rem; color: #efae10; letter-spacing: 1px; }

        .winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; }
        .hidden { display: none !important; }
        #preview-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #fff; padding: 5px; border-radius: 5px; margin: 10px 0; }
        .modal-content { background: #00332c; width: 90%; max-width: 320px; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #efae10; }
        
        /* Modal Backdrop */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="top-bar">
                <button onclick="location.reload()" class="refresh-btn">Refresh</button>
                <div class="balance-status-box">💰 ETB <span id="balance">0.00</span></div>
            </div>
            <div class="bottom-bar">
                <button class="deposit-btn" onclick="window.location.href='payment.html'">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen">
            <div class="stake-table"><div id="stake-list"></div></div>
        </div>

        <div id="card-screen" class="hidden">
            <div style="display:flex; align-items:center; justify-content:space-between; margin:10px; color: white;">
                <button onclick="showStakeScreen()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">⬅</button>
                <div style="font-size:14px;"><span id="selected-stake-val">0</span> Birr | <span id="card-count-info">0</span>/4 Cards</div>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div style="color:#efae10; font-weight:bold; font-size:16px; text-align:center; margin-top: 5px;">Win: <span id="arena-win-amount">0.00</span></div>
            <div class="game-arena-layout">
                <div class="game-status-side">
                    <div class="drawn-ball" id="current-ball">-</div>
                    <div id="numbers-board" class="numbers-board"></div>
                </div>
                <div class="cards-side">
                    <div id="arena-cards-container"></div>
                </div>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <div style="color:#00ff00; font-weight:bold; font-size:18px;" id="modal-timer">00:60</div>
                <h4 id="modal-card-no" style="color:#efae10; margin:10px 0; font-size:18px;">Card No. --</h4>
                <div id="preview-grid"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#555; color:white; font-weight:bold; cursor:pointer;">Back</button>
                    <button onclick="confirmPurchase()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#efae10; color:black; font-weight:bold; cursor:pointer;">Confirm</button>
                </div>
            </div>
        </div>

        <div id="winner-display-overlay" class="winner-overlay hidden">
            <h1 style="color:#efae10; font-size:50px; margin:0; text-shadow: 2px 2px #000;">BINGO!</h1>
            <h2 id="winner-text" style="color:white; margin:10px 0;">Card #-- is the Winner!</h2>
            <div id="winning-card-preview" style="background: white; padding: 10px; border-radius: 10px;"></div>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:#efae10; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Play Again</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
