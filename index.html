<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="top-bar">
                <button class="refresh-btn" onclick="location.reload()">Refresh</button>
                <div class="balance-box">💰 ETB <span id="balance">0.00</span></div>
            </div>
            <div class="sub-header">
                <button class="deposit-btn">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen" class="screen">
            <div class="red-alert" id="active-alert">ACTIVE AMOUNT: 0.00 ETB</div>
            
            <div class="stake-table">
                <div class="table-header">
                    <span>Stake</span><span>Active</span><span>Possible Win</span><span>Join</span>
                </div>
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="card-screen" class="screen hidden">
            <div class="card-header-container">
                <button class="back-btn" onclick="showStakeScreen()">⬅️ Back</button>
                <div class="stake-info-text"><span id="selected-stake-val">0</span> Birr Per Card</div>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="game-layout">
                    <div id="numbers-board" class="numbers-board"></div>
                    <div id="arena-card" class="player-card-arena"></div>
                </div>
                <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <div class="timer-box" id="modal-timer">00:60</div>
                <div class="card-display">
                    <h3 id="modal-card-no">Card No. --</h3>
                    <div class="bingo-labels">
                        <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
                    </div>
                    <div id="preview-grid" class="preview-grid"></div>
                </div>
                <div class="modal-btns">
                    <button class="go-back" onclick="closeModal()">Go Back</button>
                    <button class="confirm-btn" onclick="confirmPurchase()">Confirm Card</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
