<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="top-bar">
                <button onclick="location.reload()">Refresh</button>
                <div class="balance-box">💰 ETB <span id="balance">0.00</span></div>
            </div>
            <div class="sub-header" style="display:flex; justify-content:space-between; margin-top:10px;">
                <button style="background:#efae10; border:none; padding:5px 10px; border-radius:5px; font-weight:bold;">+ Deposit</button>
                <div class="logo">ARDI BINGO</div>
            </div>
        </header>

        <div id="stake-screen">
            <div id="active-alert" class="red-alert" style="display:none;">ACTIVE AMOUNT: 0.00 ETB</div>
            <div class="stake-table">
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="card-screen" class="hidden">
            <button onclick="showStakeScreen()" style="color:white; background:none; border:none; padding:10px; cursor:pointer;">⬅️ Back</button>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="game-layout">
                    <div id="numbers-board" class="numbers-board"></div>
                    <div id="arena-card" class="player-card-arena"></div>
                </div>
                <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <div id="modal-timer" style="color:#00ff00; font-size:20px; font-weight:bold; margin-bottom:10px;">00:60</div>
                <div id="preview-grid" class="preview-grid"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px;">Back</button>
                    <button onclick="confirmPurchase()" style="flex:1; padding:10px; background:#efae10; border:none; font-weight:bold;">Confirm</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
