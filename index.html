<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ardi Bingo - Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; touch-action: manipulation; }
        .stake-3d { 
            position: relative; background: linear-gradient(to bottom, #f97316, #ea580c);
            border-radius: 24px; box-shadow: 0 10px 0 #9a3412, 0 15px 25px rgba(0,0,0,0.25);
            transition: all 0.1s ease; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .stake-3d:active { transform: translateY(6px); box-shadow: 0 4px 0 #9a3412; }
        #cards-display { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; background-color: #1e40af; border-radius: 12px; }
        .compact-card { background: #3b82f6; border: 1px solid #60a5fa; border-radius: 8px; padding: 10px 0; font-weight: 900; font-size: 12px; color: white; text-align: center; }
        .selected-card-green { background: #22c55e !important; border: none !important; }
        .locked-card { opacity: 0.5; cursor: not-allowed; background: #64748b !important; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #cbd5e1; padding: 2px; }
        .bingo-cell { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
        .marked { background: #fde047 !important; border-radius: 50%; transform: scale(0.8); }
    </style>
</head>
<body class="min-h-screen">

    <div id="home-page" class="flex flex-col items-center justify-center min-h-screen p-6">
        <img src="ardi.jpg" class="w-24 h-24 rounded-full border-4 border-white shadow-xl mb-6 object-cover">
        <h1 class="text-3xl font-black text-slate-900 mb-10 italic">ARDI BINGO</h1>
        <div class="space-y-4 w-full max-w-xs text-center">
            <button onclick="showPage('stake-page')" class="w-full bg-green-600 text-white py-4 rounded-[20px] font-black shadow-lg">🕹 PLAY NOW</button>
            <button onclick="showPage('deposit-methods')" class="w-full bg-blue-700 text-white py-4 rounded-[20px] font-black shadow-lg">💰 DEPOSIT</button>
            <p id="main-wallet" class="font-black text-blue-600 mt-4">Wallet: 0.00 ETB</p>
        </div>
    </div>

    <div id="deposit-methods" class="hidden min-h-screen p-6">
        <button onclick="showPage('home-page')" class="absolute top-4 left-4 bg-white p-2 rounded-full shadow">←</button>
        <div class="mt-16 text-center">
            <h2 class="text-xl font-black text-slate-800 mb-8 uppercase italic">Choose Method</h2>
            <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto text-left font-bold">
                <div onclick="alert('Use Telegram Bot for Deposit')" class="flex items-center p-5 bg-white rounded-3xl border shadow-sm cursor-pointer">
                    <p>Telebirr / CBE</p>
                </div>
            </div>
        </div>
    </div>

    <div id="stake-page" class="hidden min-h-screen p-6 text-center">
        <button onclick="showPage('home-page')" class="absolute top-4 left-4 bg-white p-2 rounded-full shadow">←</button>
        <h1 class="mt-16 text-xl font-black mb-10 italic">CHOOSE STAKE</h1>
        <div class="grid grid-cols-2 gap-6 max-w-xs mx-auto" id="stake-container">
            <button onclick="selectStake(10)" class="stake-3d aspect-square text-white"><span class="text-3xl font-black">10</span></button>
            <button onclick="selectStake(20)" class="stake-3d aspect-square text-white"><span class="text-3xl font-black">20</span></button>
            <button onclick="selectStake(50)" class="stake-3d aspect-square text-white"><span class="text-3xl font-black">50</span></button>
            <button onclick="selectStake(100)" class="stake-3d aspect-square text-white"><span class="text-3xl font-black">100</span></button>
        </div>
    </div>

    <div id="game-page" class="hidden min-h-screen bg-slate-100 flex flex-col">
        <div class="bg-black text-white p-4 flex justify-between items-center text-[10px] font-black uppercase">
            <div class="flex flex-col"><span>Timer</span><span id="timer" class="text-sm text-red-500">60s</span></div>
            <div class="flex flex-col items-center"><span>Derrash (85%)</span><span id="derrash-display" class="text-sm text-green-400">0.00</span></div>
            <div class="flex flex-col items-end"><span>Wallet</span><span id="wallet-display" class="text-sm text-blue-400">0.00 ETB</span></div>
        </div>
        <div class="p-4 bg-white shadow-sm flex justify-between items-center">
            <span class="font-black text-slate-800 italic">Stake: <span id="current-stake-display">0</span></span>
            <span class="font-black text-blue-600">Cards: <span id="card-count">0</span>/4</span>
        </div>
        <div class="p-2 overflow-y-auto flex-1">
            <div id="cards-display"></div>
        </div>
    </div>

    <div id="card-view" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] p-6 w-full max-w-sm text-center">
            <h2 class="text-xl font-black mb-4">Card #<span id="sel-card-num"></span></h2>
            <div id="modal-grid" class="bingo-grid mb-6 rounded-lg overflow-hidden"></div>
            <div class="flex gap-2">
                <button onclick="confirmPurchase()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">BUY CARD</button>
                <button onclick="hideModal('card-view')" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black">BACK</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let wallet = parseFloat(new URLSearchParams(window.location.search).get('balance')) || 0.0;
        let currentStake = 0;
        let myCards = []; 
        let timerVal = 60;
        let boughtCardIds = new Set();

        function showPage(id) {
            document.querySelectorAll('div[id]').forEach(d => {
                if(!['deposit-modal','card-view'].includes(d.id)) d.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        function updateUI() {
            document.getElementById('wallet-display').innerText = wallet.toFixed(2) + " ETB";
            document.getElementById('main-wallet').innerText = "Wallet: " + wallet.toFixed(2) + " ETB";
            document.getElementById('card-count').innerText = myCards.length;
            document.getElementById('derrash-display').innerText = (myCards.length * currentStake * 0.85).toFixed(2);
        }

        function selectStake(amt) {
            if(myCards.length > 0) return; 
            currentStake = amt;
            document.getElementById('current-stake-display').innerText = amt;
            showPage('game-page');
            initMarket();
            startTimer();
        }

        function initMarket() {
            const container = document.getElementById('cards-display');
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                let b = document.createElement('button');
                b.id = `btn-${i}`;
                b.className = "compact-card";
                b.innerText = i;
                b.onclick = () => openCard(i);
                container.appendChild(b);
            }
        }

        let tempCard = null;
        function openCard(id) {
            if(boughtCardIds.has(id)) return;
            if(myCards.length >= 4) { alert("በአንድ ዙር ከ4 ካርድ በላይ መግዛት አይቻልም!"); return; }
            
            document.getElementById('sel-card-num').innerText = id;
            tempCard = { id: id, numbers: generateBingoNumbers() };
            
            const grid = document.getElementById('modal-grid');
            grid.innerHTML = '<div class="bg-red-600 text-white font-black py-1">B</div><div class="bg-red-600 text-white font-black py-1">I</div><div class="bg-red-600 text-white font-black py-1">N</div><div class="bg-red-600 text-white font-black py-1">G</div><div class="bg-red-600 text-white font-black py-1">O</div>';
            
            tempCard.numbers.forEach(v => {
                let d = document.createElement('div');
                d.className = "bingo-cell"; d.innerText = v;
                grid.appendChild(d);
            });
            document.getElementById('card-view').classList.remove('hidden');
        }

        function generateBingoNumbers() {
            const cols = [[1,15],[16,30],[31,45],[46,60],[61,75]];
            let nums = [];
            for(let r=0; r<5; r++){
                for(let c=0; c<5; c++){
                    if(r===2 && c===2) { nums.push("F"); continue; }
                    let n;
                    do { n = Math.floor(Math.random()*(cols[c][1]-cols[c][0]+1))+cols[c][0]; } while(nums.includes(n));
                    nums.push(n);
                }
            }
            return nums;
        }

        function confirmPurchase() {
            if(wallet < currentStake) { alert("ባላንስዎ በቂ አይደለም!"); return; }
            
            wallet -= currentStake;
            myCards.push(tempCard);
            boughtCardIds.add(tempCard.id);
            
            // Lock UI
            const btn = document.getElementById(`btn-${tempCard.id}`);
            btn.classList.add('selected-card-green');
            btn.innerText = "LOCKED";
            btn.onclick = null;
            
            // Disable stake selection
            document.getElementById('stake-container').classList.add('pointer-events-none', 'opacity-50');
            
            updateUI();
            hideModal('card-view');
        }

        function startTimer() {
            timerVal = 60;
            const tEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timerVal--;
                tEl.innerText = timerVal + "s";
                if(timerVal <= 0) {
                    clearInterval(interval);
                    const data = encodeURIComponent(JSON.stringify(myCards));
                    window.location.href = `game.html?cards=${data}&stake=${currentStake}&balance=${wallet}`;
                }
            }, 1000);
        }

        updateUI();
    </script>
</body>
</html>
