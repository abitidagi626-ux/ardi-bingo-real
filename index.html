<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="location.reload()" style="background:#555; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Refresh</button>
                <div class="balance-box">💰 ETB <span id="balance">500.00</span></div>
            </div>
            <h2 style="text-align:center; color:#efae10; margin:15px 0; letter-spacing:2px;">ARDI BINGO</h2>
        </header>

        <div id="stake-screen">
            <div class="stake-table">
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-container">
                <div class="drawn-ball" id="current-ball">-</div>
                <div class="arena-layout">
                    <div id="numbers-board" class="board-side"></div>
                    <div id="cards-stack" class="cards-side">
                        <div id="win-amount-card" class="possible-win-card-display hidden">Win: <span id="card-win-val">0.00</span></div>
                        <div id="player-card" class="player-card"></div>
                    </div>
                </div>
                <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">BINGO!</button>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-timer" style="color:#00ff00; margin-top:0;">00:60</h3>
                <div id="preview-grid" class="preview-grid"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:5px; border:none; background:#555; color:white;">Cancel</button>
                    <button id="confirm-buy" onclick="confirmPurchase()" style="flex:1; background:#efae10; border:none; font-weight:bold; border-radius:5px; padding:10px;">Buy Card</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
