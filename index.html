<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="stake-screen">
            <div class="main-header">
                <div class="top-bar">
                    <span class="logo">ARDI BINGO</span>
                    <div class="balance-box">ETB <span id="balance">0.00</span></div>
                </div>
                <div class="sub-header">
                    <button class="refresh-btn" onclick="location.reload()">Refresh</button>
                    <button class="deposit-btn">+ Deposit</button>
                </div>
            </div>
            <div class="stake-table">
                <div class="table-header">
                    <span>Stake</span><span>Active</span><span>Possible Win</span><span>Join</span>
                </div>
                <div id="stake-list"></div>
            </div>
        </div>

        <div id="card-screen" class="hidden">
            <div class="card-header-container">
                <button onclick="showStakeScreen()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">← Back</button>
                <span id="selected-stake-label"><span id="selected-stake-val">0</span> Birr Per Card</span>
            </div>
            <div id="card-grid" class="card-grid"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-header">
                <div class="stat-item">Win: <span id="game-win">0.00</span></div>
                <div class="stat-item">Stake: <span id="game-stake">0</span></div>
                <div class="stat-item">Card: <span id="game-card-no">0</span></div>
            </div>
            <div class="game-body">
                <div class="drawn-number-circle"><span id="current-ball">-</span></div>
                <div class="game-layout">
                    <div id="bingo-board" class="bingo-board"></div> <div id="player-card-display" class="player-card-view"></div> </div>
            </div>
        </div>

        <div id="card-modal" class="modal hidden">
            <div class="modal-content">
                <span id="modal-timer" class="modal-timer">00:60</span>
                <div id="modal-card-no" class="modal-card-title">Card No. 1</div>
                <div class="card-display">
                    <div class="bingo-labels"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
                    <div id="preview-grid" class="preview-grid"></div>
                </div>
                <div class="modal-btns">
                    <button onclick="closeModal()" style="background:#555;">Go Back</button>
                    <button onclick="confirmPurchase()">Confirm Card</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
