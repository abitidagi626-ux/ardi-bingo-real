<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo - መግቢያ</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #3b82f6; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn { background: #10b981; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 85%; }
        #welcome-section { display: none; }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <img src="https://i.ibb.co/Vp7vF7M/ardi-bingo-logo.jpg" style="width: 150px; border-radius: 50%;">
        <h2>እንኳን ወደ አርዲ ቢንጎ መጡ!</h2>
        <p>ለመቀጠል ስልክ ቁጥርዎን ያስገቡ</p>
        <input type="tel" id="userPhone" placeholder="0911223344" maxlength="10">
        <button class="btn" onclick="register()">ይመዝገቡ</button>
    </div>

    <div id="welcome-section" class="card">
        <h2 id="greet">ሰላም!</h2>
        <p style="background: #334155; padding: 10px; border-radius: 10px;">
            የእርስዎ ID: <strong id="myID" style="color: #fbbf24;"></strong>
        </p>
        <hr style="border: 0.5px solid #334155;">
        <button class="btn" onclick="location.href='game.html'" style="margin-top: 10px;">🎮 አሁኑኑ ይጫወቱ</button>
        <button class="btn" style="background: #3b82f6; margin-top: 10px;">💰 ሂሳብ ይሙሉ</button>
    </div>

    <script>
        // ቀድሞ የተመዘገበ ተጠቃሚ ካለ ለማየት
        window.onload = function() {
            if(localStorage.getItem('ardi_phone')) {
                showMenu();
            }
        }

        function register() {
            let phone = document.getElementById('userPhone').value;
            if(phone.length >= 10) {
                let randomID = Math.floor(10000 + Math.random() * 90000);
                localStorage.setItem('ardi_phone', phone);
                localStorage.setItem('ardi_id', randomID);
                showMenu();
            } else {
                alert("እባክዎ ትክክለኛ ስልክ ቁጥር ያስገቡ!");
            }
        }

        function showMenu() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('welcome-section').style.display = 'block';
            document.getElementById('myID').innerText = localStorage.getItem('ardi_id');
        }
    </script>
</body>
</html>
