<div id="app">
    <div id="stake-screen">
        <div class="main-header">
            <div class="balance-box">ETB <span id="balance">0.00</span></div>
        </div>
        <div id="stake-list" class="stake-table"></div>
    </div>

    <div id="card-screen" class="hidden">
        <button onclick="showStakeScreen()">Back</button>
        <div id="card-grid" class="card-grid"></div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="game-container">
            <div id="numbers-board" class="numbers-board"></div>
            <div class="active-card-view">
                <h4>Card No: <span id="active-card-id"></span></h4>
                <div id="bingo-grid-view" class="bingo-grid"></div>
            </div>
        </div>
    </div>

    <div id="card-modal" class="modal hidden">
        <div class="modal-content">
            <div id="preview-grid" class="bingo-grid"></div>
            <button onclick="confirmPurchase()">Confirm Card</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>
