<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D Stake Buttons Design */
        .stake-3d {
            transition: all 0.2s ease;
            box-shadow: 0 8px 0 #c2410c, 0 15px 20px rgba(0,0,0,.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .stake-3d:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c2410c, 0 8px 10px rgba(0,0,0,.3);
        }
        .selected-card { 
            background-color: #16a34a !important; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: not-allowed;
        }
        /* ነጭ ዳራ */
        body { background-color: #ffffff; color: #1e1b4b; }
    </style>
</head>
<body class="font-sans min-h-screen overflow-x-hidden">

    <div id="stake-page" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-3xl font-black mb-12 text-purple-900">Stake (መደብ ይምረጡ)</h1>
        <div class="grid grid-cols-2 gap-8 mb-16">
            <button onclick="selectStake(10)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">10</button>
            <button onclick="selectStake(20)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">20</button>
            <button onclick="selectStake(50)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">50</button>
            <button onclick="selectStake(100)" class="stake-3d bg-orange-500 w-28 h-28 rounded-2xl text-3xl font-black text-white">100</button>
        </div>
        <p class="text-gray-400 font-bold">@ArdiiiBingoBot</p>
    </div>

    <div id="game-page" class="hidden p-2">
        <div class="flex justify-between items-center bg-blue-600 text-white p-3 rounded-xl text-[10px] font-bold mb-4 shadow-xl">
            <div class="text-center">Game<br><span id="game-id">27721</span></div>
            <div class="text-center">Bet<br><span id="display-bet">0 ETB</span></div>
            <div class="text-center bg-white text-blue-900 px-2 py-1 rounded-lg">Timer<br><span id="timer" class="text-red-600 text-sm">60s</span></div>
            <div class="text-center">Wallet<br>0.00 ETB</div>
            <div class="text-center bg-yellow-400 text-blue-900 p-1 rounded">Derrash<br><b id="potential-win" class="text-xs">0.00</b></div>
        </div>

        <p class="text-center mb-4 font-black text-purple-900 uppercase tracking-widest">ካርቴላ ይምረጡ</p>

        <div id="cards-container" class="grid grid-cols-5 gap-3 overflow-y-auto max-h-[70vh] p-2 bg-gray-100 rounded-2xl shadow-inner">
            </div>
        <p class="text-center mt-6 text-[10px] text-gray-400 font-bold">@ArdiiiBingoBot</p>
    </div>

    <div id="card-view" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl border-4 border-orange-500">
            <h2 class="text-2xl text-purple-900 font-black mb-4">Card #<span id="selected-card-num">0</span></h2>
            <div class="grid grid-cols-5 bg-gray-200 rounded-xl overflow-hidden border-2 border-gray-300 text-black font-bold">
                <div class="bg-green-600 text-white p-2">B</div><div class="bg-red-600 text-white p-2">I</div>
                <div class="bg-orange-500 text-white p-2">N</div><div class="bg-blue-600 text-white p-2">G</div>
                <div class="bg-pink-600 text-white p-2">O</div>
                <div id="card-numbers" class="contents"></div>
            </div>
            <div class="flex gap-4 mt-8">
                <button id="accept-btn" onclick="acceptCard()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-green-700 transition">ACCEPT</button>
                <button id="cancel-btn" onclick="closeCard()" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-red-700 transition">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let selectedStake = 0;
        let selectedCardId = null;
        let isCardAccepted = false;
        let timers = { 10: 60, 20: 60, 50: 60, 100: 60 }; // እያንዳንዱ Stake የራሱ ታይመር አለው
        let currentTimerInterval = null;

        function selectStake(amount) {
            selectedStake = amount;
            document.getElementById('display-bet').innerText = amount + " ETB";
            document.getElementById('stake-page').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            initCards();
            startTimer(amount);
        }

        function initCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                let btn = document.createElement('button');
                btn.id = `card-btn-${i}`;
                btn.className = "bg-white text-purple-900 p-4 rounded-xl font-black shadow-md border-b-4 border-gray-300 hover:border-none hover:translate-y-1 transition-all";
                btn.innerText = i;
                btn.onclick = () => showCard(i);
                container.appendChild(btn);
            }
        }

        function startTimer(stakeAmount) {
            const timerEl = document.getElementById('timer');
            if(currentTimerInterval) clearInterval(currentTimerInterval);
            
            currentTimerInterval = setInterval(() => {
                timers[stakeAmount]--;
                timerEl.innerText = timers[stakeAmount] + "s";
                if(timers[stakeAmount] <= 0) {
                    clearInterval(currentTimerInterval);
                    alert("ለዚህ Stake የተሰጠው ጊዜ አልቋል!");
                }
            }, 1000);
        }

        function showCard(num) {
            if(isCardAccepted) return; // ካርቴላ ከተገዛ በኋላ ሌላ መክፈት አይቻልም
            
            selectedCardId = num;
            document.getElementById('selected-card-num').innerText = num;
            const container = document.getElementById('card-numbers');
            container.innerHTML = '';

            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    if(row === 2 && col === 2) {
                        container.innerHTML += `<div class="p-3 border border-gray-300 bg-yellow-100 flex items-center justify-center">⭐</div>`;
                    } else {
                        let min = ranges[col][0], max = ranges[col][1];
                        let val = Math.floor(Math.random() * (max - min + 1)) + min;
                        container.innerHTML += `<div class="p-3 border border-gray-300 bg-white text-sm flex items-center justify-center">${val}</div>`;
                    }
                }
            }
            document.getElementById('card-view').classList.remove('hidden');
        }

        function acceptCard() {
            isCardAccepted = true;
            let derrash = (selectedStake * 0.85).toFixed(2);
            document.getElementById('potential-win').innerText = derrash;
            
            // ካርቴላውን አረንጓዴ ማድረግ
            document.getElementById(`card-btn-${selectedCardId}`).classList.add('selected-card');
            
            // ቁልፎቹን ማጥፋት (መቀየር ወይም መሰረዝ እንዳይቻል)
            document.getElementById('accept-btn').disabled = true;
            document.getElementById('accept-btn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('cancel-btn').classList.add('hidden');
            
            alert("ካርቴላ ተገዝቷል! አሁን መቀየር ወይም መሰረዝ አይችሉም።");
            closeCard();
        }

        function closeCard() { 
            document.getElementById('card-view').classList.add('hidden'); 
        }
    </script>
</body>
</html>
