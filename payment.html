<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deposit - Ardi Bingo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #00221c; color: white; overflow-x: hidden; }

        /* Header */
        .header {
            background: #00332c;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #efae10;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { background: none; border: none; color: #efae10; font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .hidden { display: none; }

        h2 { color: #efae10; margin-bottom: 20px; font-size: 1.1rem; text-align: center; }

        /* Bank Selection Style (ምስል 1 እና 2ን መሠረት ያደረገ) */
        .bank-option {
            background: #004d40;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid rgba(239, 174, 16, 0.1);
        }
        .bank-info { display: flex; align-items: center; gap: 15px; }
        
        /* ሎጎዎቹን እዚህ ጋር ያስገቡ */
        .bank-logo { 
            width: 45px; 
            height: 45px; 
            border-radius: 8px; 
            object-fit: contain; 
            background: white; /* ምስሉ ግልጽ ካልሆነ እንዲታይ */
        }
        
        .arrow { color: #efae10; font-size: 18px; font-weight: bold; }

        /* Detail Card (ምስል 4ን መሠረት ያደረገ) */
        .detail-card {
            background: #00332c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #efae10;
        }
        .account-box {
            background: #00221c;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px dashed #efae10;
        }
        .account-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .account-number { font-size: 1.5rem; font-weight: bold; color: #efae10; letter-spacing: 1px; }
        
        .action-btn {
            background: #efae10;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .submit-btn { background: #28a745; color: white; margin-top: 15px; }

        .instruction { font-size: 0.85rem; color: #ccc; line-height: 1.6; margin-top: 15px; text-align: left; }
        .amount-input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #001a15;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 18px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">⬅</button>
        <h3 id="header-title">Deposit / ብር ያስገቡ</h3>
    </div>

    <div class="container">
        <div id="selection-page">
            <h2>የክፍያ አማራጭ ይምረጡ</h2>
            
            <div class="bank-option" onclick="showDetail('Telebirr', '0979429028', 'image_73c07b.png')">
                <div class="bank-info">
                    <img src="image_73c07b.png" alt="telebirr" class="bank-logo"> <span>Telebirr / ቴሌ ብር</span>
                </div>
                <span class="arrow">❯</span>
            </div>

            <div class="bank-option" onclick="showDetail('CBE Birr', '0979429028', 'image_73c133.png')">
                <div class="bank-info">
                    <img src="image_73c133.png" alt="cbebirr" class="bank-logo"> <span>CBE Birr / ሲቢኢ ብር</span>
                </div>
                <span class="arrow">❯</span>
            </div>

            <div class="bank-option" onclick="showDetail('CBE Bank', '1000277987067', 'image_73c133.png')">
                <div class="bank-info">
                    <img src="image_73c133.png" alt="cbe" class="bank-logo">
                    <span>CBE Bank / ንግድ ባንክ</span>
                </div>
                <span class="arrow">❯</span>
            </div>
        </div>

        <div id="detail-page" class="hidden">
            <div class="detail-card">
                <img id="detail-logo" src="" alt="logo" class="bank-logo" style="margin-bottom: 10px;">
                <h3 id="selected-bank-name" style="color: #efae10;">Bank Name</h3>
                
                <div class="account-box">
                    <p class="account-label" id="account-type-label">የስልክ ቁጥር</p>
                    <p class="account-number" id="target-number">ቁጥር</p>
                    <button class="action-btn" onclick="copyNumber()">Copy / ኮፒ አድርግ</button>
                </div>

                <div class="instruction">
                    <p><strong>መመሪያ፦</strong></p>
                    <p>1. ከላይ ያለውን ቁጥር ኮፒ አድርገው በባንክ አፕዎ ብር ይላኩ።</p>
                    <p>2. ብር ከላኩ በኋላ የላኩትን መጠን ከታች ባለው ሳጥን ውስጥ ይጻፉ።</p>
                </div>

                <input type="number" id="sent-amount" class="amount-input" placeholder="የላኩት የብር መጠን">
                <button class="action-btn submit-btn" onclick="submitRequest()">አረጋግጥ / Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 'selection';

        function showDetail(bank, number, logo) {
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('header-title').innerText = bank;
            document.getElementById('selected-bank-name').innerText = bank;
            document.getElementById('target-number').innerText = number;
            document.getElementById('detail-logo').src = logo;
            
            if(bank === 'CBE Bank') {
                document.getElementById('account-type-label').innerText = 'የአካውንት ቁጥር (Account Number)';
            } else {
                document.getElementById('account-type-label').innerText = 'የስልክ ቁጥር (Phone Number)';
            }
            
            currentPage = 'detail';
        }

        function goBack() {
            if(currentPage === 'detail') {
                document.getElementById('detail-page').classList.add('hidden');
                document.getElementById('selection-page').classList.remove('hidden');
                document.getElementById('header-title').innerText = 'Deposit / ብር ያስገቡ';
                currentPage = 'selection';
            } else {
                window.location.href = 'index.html';
            }
        }

        function copyNumber() {
            const num = document.getElementById('target-number').innerText;
            navigator.clipboard.writeText(num);
            alert("ቁጥሩ ኮፒ ተደርጓል፦ " + num);
        }

        function submitRequest() {
            const amount = document.getElementById('sent-amount').value;
            if(!amount || amount < 10) {
                alert("እባክዎ ትክክለኛ የብር መጠን ያስገቡ!");
                return;
            }
            alert(amount + " ብር የማስገባት ጥያቄዎ ተልኳል! በቅርቡ ባላንስዎ ላይ ይጨመራል።");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
