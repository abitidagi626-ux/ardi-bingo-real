<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deposit - Ardi Bingo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #00221c; color: white; overflow-x: hidden; }

        /* Header */
        .header {
            background: #00332c;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #efae10;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { background: none; border: none; color: #efae10; font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .hidden { display: none; }

        h2 { color: #efae10; margin-bottom: 20px; font-size: 1.1rem; text-align: center; }

        /* Bank Selection Style (Image 2 & 3 መሰረት) */
        .bank-option {
            background: #004d40;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid rgba(239, 174, 16, 0.2);
            transition: 0.3s;
        }
        .bank-option:active { transform: scale(0.98); background: #005a4b; }
        .bank-info { display: flex; align-items: center; gap: 15px; }
        .bank-logo { width: 40px; height: 40px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 10px; text-align: center; }
        .arrow { color: #efae10; font-weight: bold; }

        /* Detail View Style (Image 4 መሰረት) */
        .detail-card {
            background: #00332c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #efae10;
        }
        .account-box {
            background: #00221c;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px dashed #efae10;
        }
        .account-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .account-number { font-size: 1.4rem; font-weight: bold; color: #efae10; letter-spacing: 1px; }
        
        .copy-btn {
            background: #efae10;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .instruction { font-size: 0.9rem; color: #ddd; line-height: 1.5; margin-top: 15px; text-align: left; }
        
        .amount-input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #001a15;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">⬅</button>
        <h3 id="header-title">Deposit / ብር ያስገቡ</h3>
    </div>

    <div class="container">
        <div id="selection-page">
            <h2>ክፍያ የሚፈጽሙበትን ባንክ ይምረጡ</h2>
            
            <div class="bank-option" onclick="showDetail('Telebirr', '0979429028')">
                <div class="bank-info">
                    <div class="bank-logo" style="background: #2196F3; color: white;">tele<br>birr</div>
                    <span>Telebirr / ቴሌ ብር</span>
                </div>
                <span class="arrow">❯</span>
            </div>

            <div class="bank-option" onclick="showDetail('CBE Birr', '0979429028')">
                <div class="bank-info">
                    <div class="bank-logo" style="background: #4b2c85; color: white;">CBE<br>Birr</div>
                    <span>CBE Birr / ሲቢኢ ብር</span>
                </div>
                <span class="arrow">❯</span>
            </div>

            <div class="bank-option" onclick="showDetail('CBE Bank', '1000277987067')">
                <div class="bank-info">
                    <div class="bank-logo" style="background: #4b2c85; color: white;">CBE</div>
                    <span>CBE Bank / ንግድ ባንክ</span>
                </div>
                <span class="arrow">❯</span>
            </div>
        </div>

        <div id="detail-page" class="hidden">
            <div class="detail-card">
                <h3 id="selected-bank-name" style="color: #efae10;">Telebirr</h3>
                
                <div class="account-box">
                    <p class="account-label" id="account-type-label">የስልክ ቁጥር</p>
                    <p class="account-number" id="target-number">0979429028</p>
                    <button class="copy-btn" onclick="copyNumber()">Copy / ቁጥሩን ኮፒ አድርግ</button>
                </div>

                <div class="instruction">
                    <p><strong>እንዴት ብር ማስገባት ይቻላል?</strong></p>
                    <p>1. ከላይ ያለውን ቁጥር ኮፒ ያድርጉ።</p>
                    <p>2. ወደ ባንክ አፕሊኬሽንዎ በመሄድ የፈለጉትን የብር መጠን ይላኩ።</p>
                    <p>3. ብር ከላኩ በኋላ ያስገቡትን የብር መጠን እዚህ ይጥቀሱ።</p>
                </div>

                <input type="number" id="sent-amount" class="amount-input" placeholder="ያስገቡት የብር መጠን">
                <button class="copy-btn" style="background: #28a745; color: white; margin-top: 20px;" onclick="submitRequest()">ያለቀውን ፎርም ላክ</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 'selection';

        function showDetail(bank, number) {
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('header-title').innerText = bank;
            document.getElementById('selected-bank-name').innerText = bank;
            document.getElementById('target-number').innerText = number;
            
            // ለንግድ ባንክ ከሆነ "የአካውንት ቁጥር" እንዲል
            if(bank === 'CBE Bank') {
                document.getElementById('account-type-label').innerText = 'የአካውንት ቁጥር';
            } else {
                document.getElementById('account-type-label').innerText = 'የስልክ ቁጥር';
            }
            
            currentPage = 'detail';
        }

        function goBack() {
            if(currentPage === 'detail') {
                document.getElementById('detail-page').classList.add('hidden');
                document.getElementById('selection-page').classList.remove('hidden');
                document.getElementById('header-title').innerText = 'Deposit / ብር ያስገቡ';
                currentPage = 'selection';
            } else {
                window.location.href = 'index.html';
            }
        }

        function copyNumber() {
            const num = document.getElementById('target-number').innerText;
            navigator.clipboard.writeText(num);
            alert("ቁጥሩ ኮፒ ተደርጓል: " + num);
        }

        function submitRequest() {
            const amount = document.getElementById('sent-amount').value;
            if(!amount || amount < 10) {
                alert("እባክዎ ትክክለኛ የብር መጠን ያስገቡ!");
                return;
            }
            alert(amount + " ብር የማስገባት ጥያቄዎ ለሲስተም አስተዳዳሪ ተልኳል። በቅርቡ ባላንስዎ ላይ ይጨመራል።");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
