<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ardi Bingo Deposit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #00221c; color: white; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; padding: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #efae10; padding-bottom: 10px; }
        .back-btn { background: none; border: none; color: #efae10; font-size: 20px; cursor: pointer; margin-right: 10px; }
        
        .card { background: #00332c; border: 1px solid #efae10; border-radius: 15px; padding: 20px; text-align: center; }
        .bank-title { color: #efae10; font-size: 22px; margin-bottom: 15px; font-weight: bold; }
        
        .account-box { background: #001a15; border: 1px dashed #efae10; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .acc-name { font-size: 14px; color: #efae10; }
        .acc-num { font-size: 24px; font-weight: bold; margin: 5px 0; }
        
        .copy-btn { background: #efae10; color: #000; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .instruction { font-size: 13px; text-align: left; margin: 15px 0; color: #ccc; line-height: 1.5; }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #001a15; color: white; outline: none; }
        input { text-align: center; font-size: 18px; }
        textarea { height: 80px; }
        
        .confirm-btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .footer-tag { margin-top: 15px; font-size: 12px; color: #efae10; opacity: 0.8; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">⬅</button>
        <h3>Deposit / ብር ያስገቡ</h3>
    </div>

    <div class="card">
        <div class="bank-title" id="bankName">Telebirr</div>
        
        <div class="account-box">
            <p class="acc-name">Account Name: Yordanos</p>
            <p class="acc-num" id="accNumber">0979429028</p>
            <button class="copy-btn" onclick="copyAcc()">Copy / ኮፒ አድርግ</button>
        </div>

        <div class="instruction">
            1. ከላይ ያለውን ቁጥር ኮፒ አድርገው በባንክ ወይም በቴሌብር ብር ይላኩ።<br>
            2. ብር ከላኩ በኋላ የላኩትን መጠን እና የደረሰዎትን SMS ከታች ባሉት ሳጥኖች ይሙሉ::
        </div>

        <input type="number" id="amount" placeholder="300" required>
        <textarea id="transaction" placeholder="የደረሰዎትን SMS ወይም Trans. ID እዚህ ይለጥፉ..." required></textarea>

        <button class="confirm-btn" onclick="sendToBot()">አረጋግጥ / Confirm</button>
        
        <p class="footer-tag">@ArdiiiBingoBot</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function copyAcc() {
        const num = document.getElementById('accNumber').innerText;
        navigator.clipboard.writeText(num);
        alert("Account number copied!");
    }

    function sendToBot() {
        const amount = document.getElementById('amount').value;
        const transaction = document.getElementById('transaction').value;
        const bank = document.getElementById('bankName').innerText;

        if (!amount || !transaction) {
            alert("እባክዎ ሁሉንም ቦታ ይሙሉ!");
            return;
        }

        const data = {
            type: 'deposit_request',
            amount: amount,
            transaction: transaction,
            bank: bank
        };

        // ይህ መስመር ዳታውን ለቦቱ ይልካል
        tg.sendData(JSON.stringify(data));
        
        // ዳታው ተልኮ ሲያበቃ ዌብ አፑን ይዘጋል
        tg.close();
    }
</script>

</body>
</html>
