<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit - Ardi Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #00221c; color: white; }
        .header { background: #00332c; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #efae10; }
        .back-btn { background: none; border: none; color: #efae10; font-size: 24px; cursor: pointer; margin-right: 15px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .hidden { display: none; }
        .bank-option { background: #004d40; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .bank-logo { width: 45px; height: 45px; border-radius: 8px; background: white; object-fit: contain; }
        .detail-card { background: #00332c; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #efae10; }
        .account-box { background: #00221c; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed #efae10; }
        .action-btn { background: #efae10; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .submit-btn { background: #28a745; color: white; margin-top: 15px; }
        .amount-input, .message-input { width: 100%; padding: 12px; margin-top: 15px; background: #001a15; border: 1px solid #444; border-radius: 8px; color: white; outline: none; }
        .message-input { height: 80px; resize: none; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">⬅</button>
        <h3 id="header-title">Deposit / ብር ያስገቡ</h3>
    </div>

    <div class="container">
        <div id="selection-page">
            <div class="bank-option" onclick="showDetail('Telebirr', '0979429028', 'telebirr.png')">
                <div style="display:flex; align-items:center; gap:15px;"><img src="telebirr.png" class="bank-logo"><span>Telebirr</span></div>
                <span>❯</span>
            </div>
            <div class="bank-option" onclick="showDetail('CBE Bank', '1000277987067', 'cbe.png')">
                <div style="display:flex; align-items:center; gap:15px;"><img src="cbe.png" class="bank-logo"><span>CBE Bank</span></div>
                <span>❯</span>
            </div>
        </div>

        <div id="detail-page" class="hidden">
            <div class="detail-card">
                <h3 id="selected-bank-name">Bank</h3>
                <div class="account-box">
                    <p id="target-number">ቁጥር</p>
                    <button class="action-btn" onclick="copyNumber()">Copy</button>
                </div>
                <input type="number" id="sent-amount" class="amount-input" placeholder="የብር መጠን">
                <textarea id="transaction-msg" class="message-input" placeholder="የSMS መረጃ ወይም ትራንዛክሽን ቁጥር..."></textarea>
                <button class="action-btn submit-btn" onclick="submitRequest()">አረጋግጥ / Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let selectedBank = '';

        function showDetail(bank, number, logo) {
            selectedBank = bank;
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('selected-bank-name').innerText = bank;
            document.getElementById('target-number').innerText = number;
        }

        function goBack() {
            document.getElementById('detail-page').classList.add('hidden');
            document.getElementById('selection-page').classList.remove('hidden');
        }

        function copyNumber() {
            const num = document.getElementById('target-number').innerText;
            navigator.clipboard.writeText(num);
            alert("ኮፒ ተደርጓል!");
        }

        function submitRequest() {
            const amount = document.getElementById('sent-amount').value;
            const message = document.getElementById('transaction-msg').value;

            if(!amount || !message) {
                alert("እባክዎ መረጃውን በትክክል ይሙሉ!");
                return;
            }

            const payload = {
                type: 'deposit_request',
                bank: selectedBank,
                amount: amount,
                transaction: message
            };

            // መረጃውን ለቦቱ መላክ
            tg.sendData(JSON.stringify(payload));
            
            // WebApp እንዲዘጋ ማድረግ
            setTimeout(() => {
                tg.close();
            }, 500);
        }
    </script>
</body>
</html>
