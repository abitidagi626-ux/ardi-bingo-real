<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit - Ardi Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #00221c; color: white; padding: 15px; text-align: center; }
        .header { background: #00332c; padding: 15px; border-bottom: 2px solid #efae10; margin-bottom: 20px; border-radius: 10px; }
        .hidden { display: none; }
        .bank-option { background: #004d40; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(239, 174, 16, 0.2); }
        .detail-card { background: #00332c; border-radius: 15px; padding: 20px; border: 1px solid #efae10; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; background: #001a15; border: 1px solid #444; border-radius: 8px; color: white; outline: none; text-align: center; }
        .confirm-btn { background: #efae10; color: black; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .back-btn { background: none; border: none; color: #efae10; font-size: 20px; float: left; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">⬅</button>
        <h3>Deposit / ብር ያስገቡ</h3>
    </div>

    <div id="selection-page">
        <div class="bank-option" onclick="showDetail('Telebirr', '0979429028')">Telebirr / ቴሌ ብር</div>
        <div class="bank-option" onclick="showDetail('CBE Bank', '1000277987067')">CBE / ንግድ ባንክ</div>
    </div>

    <div id="detail-page" class="hidden">
        <div class="detail-card">
            <h3 id="selected-bank" style="color: #efae10; margin-bottom: 10px;">Bank</h3>
            <p id="acc-num" style="font-size: 20px; font-weight: bold; margin-bottom: 15px;">ቁጥር</p>
            <input type="number" id="amount" class="input-field" placeholder="የብር መጠን">
            <input type="text" id="trans" class="input-field" placeholder="የትራንዛክሽን ቁጥር ወይም SMS">
            <button class="confirm-btn" onclick="submitRequest()">አረጋግጥ / Confirm</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentBank = "";

        function showDetail(bank, num) {
            currentBank = bank;
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('selected-bank').innerText = bank;
            document.getElementById('acc-num').innerText = num;
        }

        function goBack() {
            document.getElementById('detail-page').classList.add('hidden');
            document.getElementById('selection-page').classList.remove('hidden');
        }

        function submitRequest() {
            const amount = document.getElementById('amount').value;
            const trans = document.getElementById('trans').value;

            if(!amount || !trans) {
                alert("እባክዎ መረጃዎችን በትክክል ያስገቡ!");
                return;
            }

            const depositData = {
                type: 'deposit_request',
                user_id: tg.initDataUnsafe.user?.id || 'Unknown',
                user_name: tg.initDataUnsafe.user?.first_name || 'User',
                bank: currentBank,
                amount: amount,
                transaction: trans
            };

            // መረጃውን ለ server.js bot.on('web_app_data') መላክ
            tg.sendData(JSON.stringify(depositData));
            tg.close();
        }
    </script>
</body>
</html>
